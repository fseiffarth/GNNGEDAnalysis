# main configuration file for running a basic graph classification experiment using the GIN and GCN models on the MUTAG dataset from the TUDataset collection.
datasets:
  - {
        # all the options are mandatory (paths should be relative to the PYTHONPATH path)
        name: "PTC_FR", # dataset name
        source: "TUDataset",  # dataset source type
        task: "graph_classification", # task type
        paths: {
          data: "data/TUDatasets/", # path to the dataset (will be downloaded if not present)
          results: "results/GIN/", # path to save the results
          models: "configs/PTC_FR/models_GIN.yml", # path to the model configuration file
          hyperparameters: "configs/PTC_FR/parameters.yml", # path to the hyperparameters configuration file
          splits: "../SimpleGNN/repo/src/simplegnn/datasets/splits/tu_splits/PTC_FR_splits.json", # path to the data splits file (contains train/val/test splits)
        }
    }
  - {
        # all the options are mandatory (paths should be relative to the PYTHONPATH path)
        name: "PTC_FR", # dataset name
        source: "TUDataset",  # dataset source type
        task: "graph_classification", # task type
        paths: {
          data: "data/TUDatasets/", # path to the dataset (will be downloaded if not present)
          results: "results/GCN/", # path to save the results
          models: "configs/PTC_FR/models_GCN.yml", # path to the model configuration file
          hyperparameters: "configs/PTC_FR/parameters.yml", # path to the hyperparameters configuration file
          splits: "../SimpleGNN/repo/src/simplegnn/datasets/splits/tu_splits/PTC_FR_splits.json", # path to the data splits file (contains train/val/test splits)
        }
    }
  - {
    # all the options are mandatory (paths should be relative to the PYTHONPATH path)
    name: "PTC_FR", # dataset name
    source: "TUDataset",  # dataset source type
    task: "graph_classification", # task type
