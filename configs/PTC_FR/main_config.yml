      data: "data/TUDatasets/", # path to the dataset (will be downloaded if not present)
      results: "results/GAT/", # path to save the results
      models: "configs/PTC_FR/models_GAT.yml", # path to the model configuration file
      hyperparameters: "configs/PTC_FR/parameters.yml", # path to the hyperparameters configuration file
      splits: "../SimpleGNN/repo/src/simplegnn/datasets/splits/tu_splits/PTC_FR_splits.json", # path to the data splits file (contains train/val/test splits)
    }
  }
